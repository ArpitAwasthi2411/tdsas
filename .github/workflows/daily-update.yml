name: .github/workflows/daily-update.yml

on:
  schedule:
    - cron: '0 10 * * *'   # Runs every day at 10:00 UTC
  workflow_dispatch:       # Allows manual trigger for testing

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create update file - 23f3001122@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" > daily-log.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "23f3001122@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
